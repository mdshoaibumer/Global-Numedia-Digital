<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#030712"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#a78bfa"/>
      <stop offset="50%" style="stop-color:#818cf8"/>
      <stop offset="100%" style="stop-color:#6366f1"/>
    </linearGradient>
    <radialGradient id="glow1" cx="30%" cy="40%">
      <stop offset="0%" style="stop-color:#7877c6;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#7877c6;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="70%" cy="60%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:0.1"/>
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:0"/>
    </radialGradient>
  </defs>
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Glow effects -->
  <ellipse cx="360" cy="250" rx="300" ry="250" fill="url(#glow1)"/>
  <ellipse cx="840" cy="380" rx="250" ry="200" fill="url(#glow2)"/>
  <!-- Content -->
  <text x="80" y="200" font-family="Georgia, serif" font-size="72" fill="white" font-weight="bold" letter-spacing="-2">Global Numedia</text>
  <text x="80" y="280" font-family="Inter, sans-serif" font-size="32" fill="rgba(255,255,255,0.7)">Digital Marketing &amp; Growth Agency</text>
  <!-- Divider line -->
  <rect x="80" y="320" width="120" height="3" fill="url(#accent)" rx="2"/>
  <!-- Stats -->
  <text x="80" y="390" font-family="Inter, sans-serif" font-size="22" fill="rgba(255,255,255,0.6)">₹680 Cr+ Revenue Generated · 240+ Brands · 5.4x Avg. ROAS</text>
  <!-- Tagline -->
  <text x="80" y="460" font-family="Georgia, serif" font-size="28" fill="url(#accent)" font-style="italic">Turn marketing into measurable revenue.</text>
  <!-- Partner badges -->
  <text x="80" y="540" font-family="Inter, sans-serif" font-size="16" fill="rgba(255,255,255,0.4)">Google Premier Partner · Meta Business Partner · HubSpot Platinum</text>
  <!-- Domain -->
  <text x="80" y="580" font-family="Inter, sans-serif" font-size="18" fill="rgba(255,255,255,0.5)">globalnumedia.digital</text>
</svg>
